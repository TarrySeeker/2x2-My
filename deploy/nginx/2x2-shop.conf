# Nginx config для 2x2-shop (Next.js) на Timeweb VPS.
# Положить в /etc/nginx/sites-available/2x2-shop.conf
# Активировать: ln -s /etc/nginx/sites-available/2x2-shop.conf /etc/nginx/sites-enabled/
# Проверить: nginx -t && systemctl reload nginx
#
# TLS выпускается через certbot:
#   sudo certbot --nginx -d 2x2hmao.ru -d www.2x2hmao.ru
# (certbot сам добавит ssl_certificate и редирект HTTP→HTTPS)

# ---------- rate-limiting зоны (глобально) ----------
# Подключается в nginx.conf в http{} блоке; если вставляешь сюда — перенеси эти три строки
# в /etc/nginx/conf.d/10-limits.conf или в http{} main-config.
# limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
# limit_req_zone $binary_remote_addr zone=api_burst:10m rate=5r/s;
# limit_req_zone $binary_remote_addr zone=admin:10m rate=10r/s;

# ---------- HTTP → HTTPS redirect ----------
server {
    listen 80;
    listen [::]:80;
    server_name 2x2hmao.ru www.2x2hmao.ru;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS main server ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 2x2hmao.ru www.2x2hmao.ru;

    # SSL cert (certbot сам пропишет эти две строки после запуска)
    # ssl_certificate     /etc/letsencrypt/live/2x2hmao.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/2x2hmao.ru/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), interest-cohort=()" always;
    # CSP: разрешаем inline-script только с nonce (Next.js + next/script сам проставляет nonce в prod),
    # плюс домены аналитики, карт и CDEK.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://mc.yandex.ru https://mc.webvisor.com https://www.googletagmanager.com https://api-maps.yandex.ru; connect-src 'self' https://*.supabase.co https://mc.yandex.ru https://mc.webvisor.com https://www.google-analytics.com https://api-maps.yandex.ru https://api.cdek.ru https://api.edu.cdek.ru; img-src 'self' data: blob: https:; font-src 'self' data: https:; style-src 'self' 'unsafe-inline'; frame-src 'self' https://www.google.com https://widget.cdek.ru https://api-maps.yandex.ru; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self';" always;

    # --- Gzip / brotli (brotli требует libnginx-mod-brotli) ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml application/json application/javascript
        application/xml+rss application/atom+xml image/svg+xml
        font/woff font/woff2 application/font-woff application/font-woff2;

    # Убрать заголовок Server
    server_tokens off;

    # Лимит на размер загружаемого файла (админка — фото товаров)
    client_max_body_size 25M;
    client_body_timeout 60s;
    client_header_timeout 30s;

    # --- Static assets (Next.js immutable) ---
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    location /_next/image {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=604800, must-revalidate";
    }

    location /favicon.ico { proxy_pass http://127.0.0.1:3000; access_log off; expires 7d; }
    location /robots.txt  { proxy_pass http://127.0.0.1:3000; access_log off; expires 1d; }
    location /sitemap.xml { proxy_pass http://127.0.0.1:3000; expires 1h; }

    # --- Healthcheck (не логируем) ---
    location = /api/health {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
        proxy_set_header Host $host;
    }

    # --- API rate-limit ---
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # --- Админка (ограничить по IP опционально) ---
    location /admin {
        # allow 1.2.3.4;   # ← раскомментировать и подставить IP клиента
        # deny all;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Main app (catch-all) ---
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Блокируем мусор
    location ~ /\.(?!well-known) { deny all; }
    location ~ /\.env           { deny all; }
    location ~ /\.git           { deny all; }
}
