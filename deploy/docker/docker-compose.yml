# Опциональный Docker Compose для 2x2-shop.
# Используется как альтернатива PM2-деплою. Запускает Next.js за Nginx.
# Запуск:
#   cd /var/www/2x2-shop/deploy/docker
#   docker compose --env-file /var/www/2x2-shop/.env.production up -d --build

services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: 2x2-shop:latest
    container_name: 2x2-shop-app
    restart: unless-stopped
    env_file:
      - ../../.env.production
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    expose:
      - "3000"
    networks:
      - web
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3000/api/health | grep -q '\"status\":\"healthy\"' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    image: nginx:alpine
    container_name: 2x2-shop-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/2x2-shop.conf:/etc/nginx/conf.d/default.conf:ro
      - ../nginx/limits.conf:/etc/nginx/conf.d/10-limits.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - web

networks:
  web:
    driver: bridge
