name: Deploy to Timeweb VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: ${{ vars.PROD_URL || 'https://2x2hmao.ru' }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /var/www/2x2-shop
            git fetch origin main
            git reset --hard origin/main
            source ~/.nvm/nvm.sh || true
            pnpm install --frozen-lockfile
            pnpm build
            pm2 reload ecosystem.config.cjs --update-env
            sleep 3
            curl -fsS http://127.0.0.1:3000/api/health | grep -q '"status":"healthy"' || (echo "health check failed"; exit 1)

      - name: Notify Telegram on success
        if: success() && vars.NOTIFY_TELEGRAM == 'true'
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="✅ 2x2-shop deployed: ${{ github.sha }} by ${{ github.actor }}"

      - name: Notify Telegram on failure
        if: failure() && vars.NOTIFY_TELEGRAM == 'true'
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="❌ 2x2-shop deploy FAILED: ${{ github.sha }} — ${{ github.run_id }}"
